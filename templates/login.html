{% extends "base.html" %}
{% block title %}Login • TechCareer{% endblock %}

{% block content %}

<div class="login-wrapper">
<div class="login-card">

<h1 class="login-title">🔐 Login</h1>

<form method="POST">

<div class="mb-3">
<label>Nome de usuário</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Senha</label>
<div class="password-input-wrapper">
<input type="password" name="password" id="password-login" class="form-control" required autocomplete="current-password">
<button type="button" class="btn-toggle-password" onclick="togglePassword('password-login', this)" title="Mostrar senha" aria-label="Mostrar senha">
<span class="icon-show">👁</span><span class="icon-hide" style="display:none">🙈</span>
</button>
</div>
</div>

<p class="text-center mt-3">
Não tem conta?
<a href="{{ url_for('register') }}">Criar conta</a>
</p>

<button type="submit" class="btn start-btn w-100">
Entrar
</button>

</form>

</div>
</div>

<script>
function togglePassword(inputId, btn) {
  var input = document.getElementById(inputId);
  var showIcon = btn.querySelector('.icon-show');
  var hideIcon = btn.querySelector('.icon-hide');
  if (input.type === 'password') {
    input.type = 'text';
    showIcon.style.display = 'none';
    hideIcon.style.display = 'inline';
    btn.setAttribute('title', 'Ocultar senha');
  } else {
    input.type = 'password';
    showIcon.style.display = 'inline';
    hideIcon.style.display = 'none';
    btn.setAttribute('title', 'Mostrar senha');
  }
}
</script>
{% endblock %}
